# Netlify config for the Next.js (App Router) app.
# The official Next.js runtime plugin handles SSR, API route handlers,
# middleware and ISR automatically — this is NOT a static export.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Next.js 15 needs Node >= 18.18; 20 is the safe current LTS.
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# /feed Lambda ısıtıcısının zamanlaması (fonksiyon: netlify/functions/keep-warm.mts).
# Bildirim BURADA çünkü .mts içindeki `export const config = { schedule }` bu
# kurulumda TETİKLENMİYOR (2026-07-24 canlı ölçüm: fonksiyon deploy olmuş ama
# cron hiç koşmamıştı). Toml bildirimi ayrıca fonksiyonu URL'den çağrılamaz yapar.
[functions."keep-warm"]
  schedule = "*/5 * * * *"

# Netlify Image CDN — uzak (Supabase Storage) görsellerin /.netlify/images
# üzerinden yeniden boyutlandırılıp WebP olarak sunulabilmesi için allowlist.
[images]
  remote_images = ['https://.*\.supabase\.co/.*']

# Güvenlik başlıkları — YALNIZ STATİK VARLIKLAR İÇİN (public/*, /_next/static).
# ⚠ 2026-07-24 CANLI ÖLÇÜM: buradaki [[headers]] blokları Next runtime'ının
# döndürdüğü SAYFA yanıtlarına UYGULANMIYOR (/feed'de ölçüldü: X-Frame-Options
# yok; /vendor dosyasında var). "Her yanıtı kapsar" şeklindeki eski varsayım
# sayfalar için yanlıştı. Sayfaların güvenlik başlıkları middleware.ts'te
# basılır — orası runtime sayfaların TEK gerçek kaynağı. Bu bloklar yüklenen
# dosyalar (uploads nosniff!) ve diğer statik varlıklar için anlamlı ve kalıyor.
[[headers]]
  for = "/*"

  [headers.values]
    # Clickjacking. Bu olmadan saldırgan <iframe src=".../settings"> açıp şeffaf
    # katmanla kullanıcıya hesap silme formunu tıklatabiliyordu (Lax çerezler
    # aynı-site istekte gönderilir). DENY güvenli: sitede kendi sayfamızı
    # çerçeveleyen hiçbir yer yok — tüm iframe'ler srcDoc sandbox ya da YouTube.
    X-Frame-Options = "DENY"

    # MIME sniffing — yüklenen dosyaların yanlış content-type ile HTML sanılıp
    # çalıştırılmasını engeller (depolanmış XSS yüzeyi).
    X-Content-Type-Options = "nosniff"

    # /login?error=... gibi URL'ler dış linklere referer olarak sızıyordu.
    Referrer-Policy = "strict-origin-when-cross-origin"

    # HSTS. Bu olmadan ilk http:// isteği düz metin gidiyor ve oturum çerezi
    # (aşağıda Secure yapıldı ama HSTS ikinci savunma) downgrade'e açık kalıyor.
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Kullanılmayan güçlü API'leri kapat.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"

# ── Content-Security-Policy — YALNIZ STATİK VARLIKLAR (yukarıdaki ölçüm notu:
# bu bloklar runtime SAYFA yanıtlarına uygulanmıyor). Sayfaların CSP'si
# middleware.ts'te basılır. ⚠ İKİ KOPYA VAR: politikayı değiştirirsen
# middleware.ts'teki CSP dizisini de değiştir. `netlify dev` kullanma: bu
# başlığı statik varlıklara uygular; sayfalar dev'de middleware'den alır
# (orada development'a 'unsafe-eval' eklenir, HMR kırılmaz).
#
# Gerekçe notları (2026-07-18 kararları — middleware'deki kopya için de geçerli):
# · NONCE YOK: landing + 32 makale build'de önceden üretiliyor (○ Static);
#   HTML donuk, nonce istek başına değişir — uyuşmazlar. 'unsafe-inline' kaçınılmaz.
# · Değer yine de kıymetli: base-uri/form-action/object-src enjeksiyon kaçışlarını,
#   connect-src ise XSS başarılı olsa bile veriyi DIŞARI taşımayı (exfiltration) keser.
# · img-src bilinçli geniş (https:): dış görsel çeken makaleler + kullanıcı
#   makaleleri sessizce kırılmasın (carthage Unsplash örneği).
# · cdnjs script-src'de KALMALI: kullanıcı makalesi sandbox iframe'leri kullanıyor
#   (kürate makaleler 2026-07-24'te /vendor'a geçti, onlar için artık gerekmiyor).
# · fonts.gstatic/googleapis: kullanıcı makalelerinin 19 font seçeneği.
# · GA bölgesel adres kullanır (region1.google-analytics.com) → *.google-analytics.com.
# · Sorun çıkarsa geri almak: başlık adını Content-Security-Policy-Report-Only yap.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.googleadservices.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://*.google.com https://*.doubleclick.net https://www.googleadservices.com https://*.giphy.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://open.spotify.com; worker-src 'self' blob:; report-uri /api/csp-report"

# ── Statik varlık önbelleği (2026-07-18). ÖNCESİNDE HİÇ YOKTU: public/* ve
# /.netlify/images türevleri max-age=0 dönüyordu (canlı ölçüldü) → 589KB'lık
# three-r128.min.js dahil her varlık her tekrar ziyarette yeniden doğrulanıyordu.
# Image CDN türevi kaynağın başlığını miras alır → aşağıdakiler türevleri de düzeltir.
# /_next/static'i Next plugin'i zaten hallediyor; bunlar yalnız public/ katmanı.

# İçerik değişince dosya ADI değişen/hiç değişmeyen katmanlar → 1 yıl immutable.
# (vendor: sürümlü dosya adı; uploads: timestamp'li ad; articles: makale görselleri)
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# İKİ segment (/articles/<slug>/<dosya>) → yalnız görseller. TEK segmentli
# /articles/<slug> HTML sayfalarını YAKALAMAZ (onlar Next cache'inde).
[[headers]]
  for = "/articles/:slug/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Marka/ikon dosyaları aynı adla DEĞİŞEBİLİR (logo yenilemesi) → immutable değil,
# 7 gün. Eski logoyu 1 yıl gösterme riskine girmeye değmez.
[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Landing hero fotoğrafları (2026-07-23 denetimi): public/landing/ klasörü
# 2026-07-21'de — yani buradaki statik varlık geçişinden SONRA — eklendi ve
# kapsam dışı kaldı → max-age=0 dönüyordu; tekrar ziyarette LCP görseli her
# seferinde 304 doğrulama turu bekliyordu. /brand mantığı: dosya aynı adla
# değişebilir → immutable değil, 7 gün.
# DERS: public/ altına yeni klasör eklerken buraya header bloğu da ekle.
[[headers]]
  for = "/landing/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
